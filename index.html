<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC网页版 - 在浏览器中玩 Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b8c5d6;
            --accent: #00d4ff;
            --accent-hover: #00a8cc;
            --border: rgba(255, 255, 255, 0.15);
            --shadow: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e2e8f0;
            --bg-card: rgba(255, 255, 255, 0.7);
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --accent: #3182ce;
            --accent-hover: #2c5282;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 60%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(2deg); }
            66% { transform: translate(-20px, 20px) rotate(-2deg); }
        }

        /* 顶部栏 */
        .top-bar {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d4ff, #8a2be2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .top-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .theme-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px;
        }

        .menu-btn span {
            display: block;
            width: 20px;
            height: 2px;
            background: currentColor;
            border-radius: 2px;
        }

        /* 通知栏 */
        .notification {
            width: 90%;
            max-width: 600px;
            margin: 20px auto 0;
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(138, 43, 226, 0.15));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .notification-text {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .notification-text .sparkle {
            color: #ffd700;
            margin-right: 5px;
        }

        .notification-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 600px;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #8a2be2, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .hero-subtitle {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            margin-bottom: 15px;
        }

        .hero-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 40px;
        }

        /* 选择器区域 */
        .selector-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .selector-group {
            position: relative;
        }

        .selector-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
            padding-left: 5px;
        }

        .custom-select {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .custom-select:hover {
            border-color: var(--accent);
        }

        .custom-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }

        .select-arrow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* 立即游戏按钮 */
        .play-btn {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .play-btn:hover::before {
            left: 100%;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.4);
        }

        .play-btn:active {
            transform: translateY(-1px);
        }

        /* 了解更多按钮 */
        .learn-more {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .learn-more:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 版本信息卡片 */
        .version-info {
            width: 100%;
            margin-top: 30px;
            padding: 20px;
            border-radius: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .version-info h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .version-info p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 底部 */
        .footer {
            width: 100%;
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .hero-title {
                font-size: 1.8rem;
            }
            .hero-subtitle {
                font-size: 1.3rem;
            }
            .play-btn {
                font-size: 1.1rem;
                padding: 16px;
            }
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.1rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- 顶部栏 -->
    <div class="top-bar">
        <div class="logo">
            <div class="logo-icon">⛏️</div>
            <span>MC网页版</span>
        </div>
        <div class="top-controls">
            <button class="theme-btn" id="themeToggle" title="切换主题">🌙</button>
            <button class="menu-btn" title="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>

    <!-- 通知栏 -->
    <div class="notification" id="notification">
        <span class="notification-text">
            <span class="sparkle">✨</span>
            支持原版、PixelClient、TuffClient 多种客户端！
        </span>
        <button class="notification-close" onclick="this.parentElement.style.display='none'">✕</button>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <h1 class="hero-title">在浏览器中玩</h1>
        <h2 class="hero-subtitle">Minecraft</h2>
        <p class="hero-desc">无需下载。点击即玩！</p>

        <!-- 选择器 -->
        <div class="selector-container">
            <div class="selector-group">
                <label class="selector-label">选择游戏版本</label>
                <div style="position: relative;">
                    <select class="custom-select" id="versionSelect">
                        <option value="1.8.8">Minecraft 1.8.8</option>
                        <option value="1.12.2">Minecraft 1.12.2</option>
                    </select>
                    <span class="select-arrow">▼</span>
                </div>
            </div>

            <div class="selector-group">
                <label class="selector-label">选择客户端</label>
                <div style="position: relative;">
                    <select class="custom-select" id="clientSelect">
                        <option value="original">原版 (Original)</option>
                        <option value="pixel">Pixel Client</option>
                        <option value="tuff">Tuff Client</option>
                    </select>
                    <span class="select-arrow">▼</span>
                </div>
            </div>

            <div class="selector-group">
                <label class="selector-label">渲染模式</label>
                <div style="position: relative;">
                    <select class="custom-select" id="renderSelect">
                        <option value="">标准模式 (Standard)</option>
                        <option value="wasm">WASM-GC 模式</option>
                    </select>
                    <span class="select-arrow">▼</span>
                </div>
            </div>
        </div>

        <!-- 立即游戏按钮 -->
        <button class="play-btn" id="playBtn" onclick="launchGame()">
            🎮 立即游戏
        </button>

        <button class="learn-more" onclick="showInfo()">了解更多</button>

        <!-- 版本信息 -->
        <div class="version-info" id="versionInfo">
            <h3>📋 当前选择</h3>
            <p id="currentSelection">版本: 1.8.8 | 客户端: 原版 | 模式: 标准模式</p>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        MC网页版聚合站点 | 基于 EaglerCraft 开源项目
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在启动游戏...</div>
    </div>

    <script>
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        let isDark = true;

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            document.body.setAttribute('data-theme', isDark ? '' : 'light');
            themeToggle.textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // 恢复主题设置
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            isDark = false;
            document.body.setAttribute('data-theme', 'light');
            themeToggle.textContent = '☀️';
        }

        // 文件映射表
        const fileMap = {
            '1.8.8': {
                'original': {
                    '': 'Eaglercraft_IR_1.8.8.html',
                    'wasm': 'Eaglercraft_IR_1.8.8wasm.html'
                },
                'pixel': {
                    '': 'Eaglercraft_IR_PixelClient_1.8.8.html',
                    'wasm': 'Eaglercraft_IR_PixelClient_1.8.8wasm.html'
                }
            },
            '1.12.2': {
                'original': {
                    '': 'Eaglercraft_IR_1.12.2.html',
                    'wasm': 'Eaglercraft_IR_1.12.2wasm.html'
                },
                'pixel': {
                    '': 'Eaglercraft_IR_PixelClient_1.12.2.html',
                    'wasm': 'Eaglercraft_IR_PixelClient_1.12.2wasm.html'
                },
                'tuff': {
                    '': 'Eaglercraft_IR_TuffClient_1.12.2.html',
                    'wasm': 'Eaglercraft_IR_TuffClient_1.12.2wasm.html'
                }
            }
        };

        // 更新版本信息显示
        function updateInfo() {
            const version = document.getElementById('versionSelect').value;
            const client = document.getElementById('clientSelect').value;
            const render = document.getElementById('renderSelect').value;

            const clientNames = {
                'original': '原版',
                'pixel': 'Pixel Client',
                'tuff': 'Tuff Client'
            };

            const renderNames = {
                '': '标准模式',
                'wasm': 'WASM-GC 模式'
            };

            document.getElementById('currentSelection').textContent = 
                `版本: ${version} | 客户端: ${clientNames[client]} | 模式: ${renderNames[render]}`;
        }

        // 监听选择变化
        document.getElementById('versionSelect').addEventListener('change', function() {
            const version = this.value;
            const clientSelect = document.getElementById('clientSelect');

            // 1.8.8 不支持 Tuff Client
            if (version === '1.8.8') {
                if (clientSelect.value === 'tuff') {
                    clientSelect.value = 'original';
                }
                // 禁用 Tuff 选项
                Array.from(clientSelect.options).forEach(opt => {
                    if (opt.value === 'tuff') {
                        opt.disabled = true;
                        opt.style.opacity = '0.4';
                    }
                });
            } else {
                // 启用 Tuff 选项
                Array.from(clientSelect.options).forEach(opt => {
                    if (opt.value === 'tuff') {
                        opt.disabled = false;
                        opt.style.opacity = '1';
                    }
                });
            }
            updateInfo();
        });

        document.getElementById('clientSelect').addEventListener('change', updateInfo);
        document.getElementById('renderSelect').addEventListener('change', updateInfo);

        // 启动游戏
        function launchGame() {
            const version = document.getElementById('versionSelect').value;
            const client = document.getElementById('clientSelect').value;
            const render = document.getElementById('renderSelect').value;

            const file = fileMap[version]?.[client]?.[render];

            if (!file) {
                alert('抱歉，该组合暂不可用！');
                return;
            }

            // 显示加载动画
            document.getElementById('loadingOverlay').classList.add('active');

            // 延迟跳转，让用户看到加载效果
            setTimeout(() => {
                window.location.href = file;
            }, 800);
        }

        // 了解更多
        function showInfo() {
            alert(`MC网页版 使用说明：

📌 支持的版本：
   • Minecraft 1.8.8
   • Minecraft 1.12.2

📌 支持的客户端：
   • 原版 (Original)
   • Pixel Client
   • Tuff Client (仅 1.12.2)

📌 渲染模式：
   • 标准模式：兼容性更好
   • WASM-GC 模式：性能更优

💡 提示：首次加载可能需要一些时间，请耐心等待！`);
        }

        // 初始化
        updateInfo();

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                launchGame();
            }
        });
    </script>
</body>
</html>
